<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 PROJECT — Workflow & Integration Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0F;
            --s1: #141416;
            --s2: #1C1C1F;
            --s3: #242427;
            --b1: rgba(255, 255, 255, 0.06);
            --b2: rgba(255, 255, 255, 0.10);
            --b3: rgba(255, 255, 255, 0.16);
            --white: #F5F5F6;
            --muted: #8A8A96;
            --dim: #5A5A66;
            --green: #3ECF8E;
            --gd: rgba(62, 207, 142, 0.10);
            --orange: #F97316;
            --od: rgba(249, 115, 22, 0.10);
            --red: #EF4444;
            --amber: #F59E0B;
            --blue: #60A5FA;
            --bd: rgba(96, 165, 250, 0.10);
            --purple: #C084FC;
            --pd: rgba(192, 132, 252, 0.10);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --r: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            background: var(--bg);
            color: var(--white);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::selection {
            background: var(--green);
            color: #000;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--s3);
            border-radius: 2px;
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 70px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0 22px;
            border-bottom: 1px solid var(--b1);
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tb-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            width: 28px;
            height: 28px;
            background: var(--green);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-icon span {
            font-family: var(--mono);
            font-size: 8px;
            font-weight: 700;
            color: #000;
        }
        .brand-name {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }
        .tb-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-btn {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 10px;
            border: 1px solid var(--green);
            background: var(--green);
            color: #000;
            cursor: pointer;
            border-radius: 4px;
            transition: all .2s;
            white-space: nowrap;
        }
        .lang-btn:hover {
            background: transparent;
            color: var(--green);
        }
        .page-subtitle {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.4;
        }

        /* USE CASE ROW */
        .persona-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .persona-label {
            font-family: var(--mono);
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding-top: 6px;
            flex-shrink: 0;
            margin-right: 4px;
        }
        .persona-btn {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            padding: 5px 13px;
            border-radius: 5px;
            border: 1px solid var(--b2);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .persona-btn:hover {
            border-color: var(--b3);
            color: var(--white);
        }
        .persona-btn.active-lg {
            color: #3ECF8E;
            background: rgba(62, 207, 142, 0.08);
            border-color: rgba(62, 207, 142, 0.3);
        }
        .persona-btn.active-hi {
            color: #60A5FA;
            background: rgba(96, 165, 250, 0.08);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .persona-btn.active-se {
            color: #C084FC;
            background: rgba(192, 132, 252, 0.08);
            border-color: rgba(192, 132, 252, 0.3);
        }
        .dot-lg {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3ECF8E;
            flex-shrink: 0;
        }
        .dot-hi {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #60A5FA;
            flex-shrink: 0;
        }
        .dot-se {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #C084FC;
            flex-shrink: 0;
        }

        /* TIER ROW */
        .sc-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .sc-label {
            font-family: var(--mono);
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding-top: 6px;
            flex-shrink: 0;
            margin-right: 4px;
        }
        .sc-btn {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 5px;
            border: 1px solid var(--b2);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sc-btn:hover {
            border-color: var(--b3);
            color: var(--white);
        }
        .sc-btn.active-s {
            background: var(--gd);
            color: var(--green);
            border-color: rgba(62, 207, 142, 0.3);
        }
        .sc-btn.active-p {
            background: var(--bd);
            color: var(--blue);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .sc-btn.active-e {
            background: var(--od);
            color: var(--orange);
            border-color: rgba(249, 115, 22, 0.3);
        }
        .sc-dot-s {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3ECF8E;
            flex-shrink: 0;
        }
        .sc-dot-p {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #60A5FA;
            flex-shrink: 0;
        }
        .sc-dot-e {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #F97316;
            flex-shrink: 0;
        }
        .tier-badge {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: 1px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 3px;
            vertical-align: middle;
        }
        .badge-s {
            background: var(--gd);
            color: var(--green);
        }
        .badge-p {
            background: var(--bd);
            color: var(--blue);
        }
        .badge-e {
            background: var(--od);
            color: var(--orange);
        }

        /* SETUP FEE CALLOUT */
        .setup-fee-callout {
            font-family: var(--mono);
            font-size: 8px;
            color: var(--amber);
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 3px 8px;
            border-radius: 3px;
            margin-left: 6px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* FLOW CARD */
        .card {
            background: var(--s1);
            border: 1px solid var(--b1);
            border-radius: var(--r);
            margin-bottom: 10px;
        }
        .ch {
            padding: 14px 18px;
            border-bottom: 1px solid var(--b1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .ct {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }
        .flow-body {
            position: relative;
            padding: 22px 16px 26px;
            min-height: 700px;
            overflow: hidden;
        }
        .flow-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .flow-grid {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .flow-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            position: relative;
            padding-left: 0;
        }
        .flow-row-label {
            position: absolute;
            left: -4px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center center;
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            white-space: nowrap;
            pointer-events: none;
        }

        /* NODES */
        .node {
            background: var(--s2);
            border: 1px solid var(--b1);
            border-radius: 7px;
            padding: 11px 13px;
            cursor: pointer;
            transition: all .35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-width: 82px;
            text-align: center;
            user-select: none;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .node:hover {
            border-color: var(--b3);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .node:active {
            transform: scale(0.97);
        }
        .node-idt {
            font-family: var(--mono);
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 3px;
            line-height: 1;
            flex-shrink: 0;
        }
        .idt-available {
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
            border: 1px solid var(--b2);
        }
        .idt-locked {
            background: transparent;
            color: var(--dim);
            border: 1px solid var(--b1);
        }
        .node-name {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--white);
            line-height: 1.3;
        }
        .node-sub {
            font-size: 8px;
            color: var(--dim);
            line-height: 1.2;
            max-width: 100px;
        }
        .node-tier-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            font-family: var(--mono);
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 7px;
            border-radius: 10px;
            pointer-events: none;
            transition: all .35s;
            z-index: 4;
        }
        .ntb-starter {
            background: var(--gd);
            color: var(--green);
            border: 1px solid rgba(62, 207, 142, 0.25);
        }
        .ntb-pro {
            background: var(--bd);
            color: var(--blue);
            border: 1px solid rgba(96, 165, 250, 0.25);
        }
        .ntb-enterprise {
            background: var(--od);
            color: var(--orange);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        /* Node states */
        .node.locked {
            opacity: 0.30;
            filter: grayscale(0.5);
            pointer-events: none;
            border-style: dashed;
        }
        .node.locked .node-tier-badge {
            opacity: 1;
            filter: none;
        }
        .node.available {
            opacity: 1;
            filter: none;
            border-style: solid;
        }
        .node.available.glow-green {
            border-color: rgba(62, 207, 142, 0.25);
            box-shadow: 0 0 16px rgba(62, 207, 142, 0.05);
        }
        .node.available.glow-blue {
            border-color: rgba(96, 165, 250, 0.25);
            box-shadow: 0 0 16px rgba(96, 165, 250, 0.05);
        }
        .node.available.glow-orange {
            border-color: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.05);
        }
        .node.selected {
            border-color: var(--green) !important;
            box-shadow: 0 0 28px rgba(62, 207, 142, 0.18) !important;
            background: var(--s3);
            z-index: 5;
        }
        @keyframes pulseNode {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(62, 207, 142, 0.03);
            }
            50% {
                box-shadow: 0 0 18px rgba(62, 207, 142, 0.10);
            }
        }
        .node.pulse {
            animation: pulseNode 2.6s ease-in-out infinite;
        }

        /* DETAIL PANEL */
        .detail-panel {
            background: var(--s1);
            border: 1px solid var(--b1);
            border-radius: var(--r);
            padding: 0 18px;
            overflow: hidden;
            transition: all .35s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            opacity: 0;
            margin-bottom: 8px;
        }
        .detail-panel.open {
            max-height: 380px;
            opacity: 1;
            padding: 14px 18px;
        }
        .detail-title {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--green);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .detail-body {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }
        .detail-body strong {
            color: var(--white);
        }
        .detail-tier-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .detail-tier-pill {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .dtp-on {
            background: var(--gd);
            color: var(--green);
            border: 1px solid rgba(62, 207, 142, 0.2);
        }
        .dtp-off {
            background: transparent;
            color: var(--dim);
            border: 1px solid var(--b1);
        }

        /* LEGEND */
        .legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            padding: 8px 0;
            font-size: 10px;
            color: var(--muted);
            font-family: var(--mono);
            letter-spacing: 0.5px;
            align-items: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 9px;
        }
        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-dash {
            width: 14px;
            height: 1.5px;
            flex-shrink: 0;
            border-radius: 1px;
        }

        /* SVG ANIMATIONS */
        @keyframes flowDash {
            to {
                stroke-dashoffset: -22;
            }
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .flow-body {
                padding: 14px 4px 18px;
                min-height: 560px;
            }
            .flow-grid {
                gap: 22px;
            }
            .flow-row {
                gap: 5px;
                padding-left: 0;
            }
            .flow-row-label {
                display: none;
            }
            .node {
                padding: 8px 9px;
                min-width: 56px;
                gap: 2px;
                border-radius: 5px;
            }
            .node-idt {
                font-size: 7px;
                padding: 1px 4px;
            }
            .node-name {
                font-size: 7px;
            }
            .node-sub {
                font-size: 7px;
                max-width: 70px;
            }
            .node-tier-badge {
                font-size: 6px;
                padding: 1px 5px;
                top: -5px;
                right: -5px;
            }
            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .sc-btn {
                font-size: 9px;
                padding: 3px 8px;
            }
            .persona-btn {
                font-size: 9px;
                padding: 4px 9px;
            }
            .setup-fee-callout {
                font-size: 7px;
                padding: 2px 5px;
                margin-left: 3px;
            }
        }
        @media(max-width:480px) {
            .flow-body {
                padding: 10px 2px 14px;
                min-height: 420px;
            }
            .flow-grid {
                gap: 14px;
            }
            .node {
                padding: 6px 7px;
                min-width: 42px;
                border-radius: 4px;
            }
            .node-idt {
                font-size: 6px;
                padding: 1px 3px;
            }
            .node-name {
                font-size: 6px;
                letter-spacing: 0;
            }
            .node-sub {
                display: none;
            }
            .node-tier-badge {
                font-size: 5px;
                padding: 1px 4px;
                top: -4px;
                right: -4px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <!-- TOPBAR -->
        <div class="topbar">
            <div class="tb-left">
                <div class="brand-icon"><span>24/7</span></div>
                <span class="brand-name">24/7 PROJECT</span>
            </div>
            <div class="tb-right">
                <span class="page-subtitle" id="page-subtitle">Workflow & Integration Pipeline</span>
                <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
            </div>
        </div>

        <!-- USE CASE SWITCHER -->
        <div class="persona-row" id="persona-row">
            <span class="persona-label" data-i18n="uc_label">Anwendungsfall:</span>
            <button class="persona-btn active-lg" data-uc="leadgen" onclick="setUseCase('leadgen',this)">
                <span class="dot-lg"></span><span data-i18n="uc_leadgen">Lead Gen & Closing</span>
            </button>
            <button class="persona-btn" data-uc="hiring" onclick="setUseCase('hiring',this)">
                <span class="dot-hi"></span><span data-i18n="uc_hiring">Hiring Agency</span>
            </button>
            <button class="persona-btn" data-uc="secretary" onclick="setUseCase('secretary',this)">
                <span class="dot-se"></span><span data-i18n="uc_secretary">KI-Rezeptionist</span>
            </button>
        </div>

        <!-- TIER SWITCHER -->
        <div class="sc-row">
            <span class="sc-label" data-i18n="tier_label">Stufe:</span>
            <button class="sc-btn active-s" data-tier="starter" onclick="setTier('starter',this)">
                <span class="sc-dot-s"></span>Starter<span class="tier-badge badge-s">&euro;699</span>
            </button>
            <button class="sc-btn" data-tier="pro" onclick="setTier('pro',this)">
                <span class="sc-dot-p"></span>Professional<span class="tier-badge badge-p">&euro;4,5K</span><span class="setup-fee-callout">+&euro;2.500 Setup</span>
            </button>
            <button class="sc-btn" data-tier="enterprise" onclick="setTier('enterprise',this)">
                <span class="sc-dot-e"></span>Enterprise<span class="tier-badge badge-e">&euro;25K</span><span class="setup-fee-callout">+&euro;5.000 Setup</span>
            </button>
        </div>

        <!-- FLOW CARD -->
        <div class="card">
            <div class="ch">
                <span class="ct" data-i18n="flow_title">ARCHITEKTUR-PIPELINE</span>
                <span style="font-family:var(--mono);font-size:9px;color:var(--muted)" id="flow-tier-indicator"></span>
            </div>
            <div class="flow-body" id="flow-body">
                <svg class="flow-svg" id="flow-svg"></svg>
                <div class="flow-grid" id="flow-grid"></div>
            </div>
        </div>

        <!-- DETAIL PANEL -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-title" id="detail-title"></div>
            <div class="detail-body" id="detail-body"></div>
            <div class="detail-tier-row" id="detail-tiers"></div>
        </div>

        <!-- LEGEND -->
        <div class="legend">
            <span style="color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-size:8px" data-i18n="legend_title">Legende:</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span><span data-i18n="legend_starter">Starter &euro;699</span></span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span><span data-i18n="legend_pro">Professional &euro;4,5K</span></span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span><span data-i18n="legend_ent">Enterprise &euro;25K</span></span>
            <span class="legend-item" style="margin-left:6px"><span class="legend-dash" style="background:var(--s3);border:1px dashed var(--dim)"></span><span data-i18n="legend_locked">Gesperrt</span></span>
            <span class="legend-item"><svg width="14" height="3" style="flex-shrink:0;overflow:visible"><line x1="0" y1="1.5" x2="14" y2="1.5" stroke="#3ECF8E" stroke-width="1.5" stroke-dasharray="7 4" stroke-linecap="round"><animate attributeName="stroke-dashoffset" from="0" to="-22" dur="0.8s" repeatCount="indefinite"/></line></svg><span data-i18n="legend_active">Aktiver Fluss</span></span>
            <span class="legend-item" style="margin-left:6px"><span style="color:var(--amber);font-size:9px">&#9650;</span><span data-i18n="legend_setup">Setup-Gebühr</span></span>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // LANGUAGE DATA
            // ──────────────────────────────────────
            const LANG = {

            // ──────────────────────────────────────
            // STATE
            // ──────────────────────────────────────
            let currentLang = 'de';
            let currentTier = 'starter';
            let currentUseCase = 'leadgen';
            let selectedNodeId = null;
            let particles = [];
            let animFrameId = null;

            // ──────────────────────────────────────
            // DOM REFS
            // ──────────────────────────────────────
            const flowGrid = document.getElementById('flow-grid');
            const flowSvg = document.getElementById('flow-svg');
            const flowBody = document.getElementById('flow-body');
            const detailPanel = document.getElementById('detail-panel');
            const detailTitle = document.getElementById('detail-title');
            const detailBody = document.getElementById('detail-body');
            const detailTiers = document.getElementById('detail-tiers');
            const flowTierIndicator = document.getElementById('flow-tier-indicator');
            const pageSubtitle = document.getElementById('page-subtitle');
            const langBtn = document.getElementById('lang-btn');

            // ──────────────────────────────────────
            // HELPERS
            // ──────────────────────────────────────
            function t(key) { return LANG[currentLang][key] || key; }

            function tierRank(tier) { return tier === 'starter' ? 0 : tier === 'pro' ? 1 : 2; }

            function isNodeAvailable(nodeTier) { return tierRank(currentTier) >= tierRank(nodeTier); }

            function getGlowClass() { return currentTier === 'starter' ? 'glow-green' : currentTier === 'pro' ?
                    'glow-blue' : 'glow-orange'; }

            function getTierBadgeClass(tier) { return tier === 'starter' ? 'ntb-starter' : tier === 'pro' ?
                    'ntb-pro' : 'ntb-enterprise'; }

            function getTierBadgeText(tier) { return tier === 'enterprise' ? 'ENT' : tier === 'pro' ? 'PRO' :
                    'STA'; }

            function getGlowColor() { return currentTier === 'starter' ? '#3ECF8E' : currentTier === 'pro' ?
                    '#60A5FA' : '#F97316'; }

            function updateI18n() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (LANG[currentLang][key]) el.textContent = LANG[currentLang][key];
                });
                pageSubtitle.textContent = t('page_subtitle');
                langBtn.textContent = currentLang === 'de' ? 'EN' : 'DE';
                flowTierIndicator.textContent = t('click_node');
            }

            // ──────────────────────────────────────
            // RENDER FLOW GRID
            // ──────────────────────────────────────
            function renderFlowGrid() {
                const config = NODE_CONFIG[currentUseCase];
                const glowClass = getGlowClass();
                flowGrid.innerHTML = config.rows.map(row => {
                    const rowLabel = t('row_' + row.id) || row.id;
                    const nodesHTML = row.nodes.map(node => {
                        const available = isNodeAvailable(node.tier);
                        const lockedClass = available ? 'available ' + glowClass : 'locked';
                        const selectedClass = node.id === selectedNodeId ? ' selected' : '';
                        const pulseClass = available && node.tier === currentTier ? ' pulse' : '';
                        const nodeName = node.name[currentLang] || node.name.en;
                        const nodeSub = node.sub[currentLang] || node.sub.en;
                        return `
                  <div class="node ${lockedClass}${selectedClass}${pulseClass}"
                       data-node-id="${node.id}" data-tier="${node.tier}"
                       title="${nodeName} — ${nodeSub}">
                    ${!available ? `<span class="node-tier-badge ${getTierBadgeClass(node.tier)}">${getTierBadgeText(node.tier)}</span>` : ''}
                    <span class="node-idt ${available ? 'idt-available' : 'idt-locked'}">${node.idt}</span>
                    <div class="node-name">${nodeName}</div>
                    <div class="node-sub">${nodeSub}</div>
                  </div>`;
                    }).join('');
                    return `<div class="flow-row" data-row-id="${row.id}"><span class="flow-row-label">${rowLabel}</span>${nodesHTML}</div>`;
                }).join('');

                document.querySelectorAll('.node:not(.locked)').forEach(el => {
                    el.addEventListener('click', function() {
                        onNodeClick(this.getAttribute('data-node-id'));
                    });
                });

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => updateSVGConnections());
                });
            }

            // ──────────────────────────────────────
            // SVG CONNECTIONS + PARTICLES
            // ──────────────────────────────────────
            function updateSVGConnections() {
                const svg = flowSvg;
                const containerRect = flowBody.getBoundingClientRect();
                const rows = flowGrid.querySelectorAll('.flow-row');
                const w = containerRect.width;
                const h = containerRect.height;
                svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
                svg.style.width = w + 'px';
                svg.style.height = h + 'px';
                svg.innerHTML = '';
                const allPaths = [];
                const glowColor = getGlowColor();

                for (let i = 0; i < rows.length - 1; i++) {
                    const topNodes = rows[i].querySelectorAll('.node');
                    const bottomNodes = rows[i + 1].querySelectorAll('.node');
                    const topAvail = [],
                        bottomAvail = [];
                    topNodes.forEach(n => { if (isNodeAvailable(n.getAttribute('data-tier'))) topAvail.push(
                            n); });
                    bottomNodes.forEach(n => { if (isNodeAvailable(n.getAttribute('data-tier')))
                            bottomAvail.push(n); });
                    if (!topAvail.length || !bottomAvail.length) continue;
                    topAvail.forEach(tn => {
                        const tRect = tn.getBoundingClientRect();
                        const tx = tRect.left - containerRect.left + tRect.width / 2;
                        const ty = tRect.top - containerRect.top + tRect.height;
                        const scored = bottomAvail.map(bn => {
                            const bRect = bn.getBoundingClientRect();
                            const bx = bRect.left - containerRect.left + bRect.width / 2;
                            const by = bRect.top - containerRect.top;
                            return { node: bn, bx, by, dist: Math.abs(tx - bx) };
                        }).sort((a, b) => a.dist - b.dist);
                        scored.slice(0, Math.min(2, scored.length)).forEach(t => {
                            const cy = (ty + t.by) / 2;
                            allPaths.push({
                                d: `M${tx.toFixed(1)},${ty.toFixed(1)} C${tx.toFixed(1)},${cy.toFixed(1)} ${t.bx.toFixed(1)},${cy.toFixed(1)} ${t.bx.toFixed(1)},${t.by.toFixed(1)}`
                            });
                        });
                    });
                }

                allPaths.forEach(p => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', p.d);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', glowColor);
                    path.setAttribute('stroke-width', '1.4');
                    path.setAttribute('stroke-dasharray', '7 4');
                    path.setAttribute('stroke-linecap', 'round');
                    path.setAttribute('opacity', '0.45');
                    path.style.animation = 'flowDash 1.1s linear infinite';
                    svg.appendChild(path);
                });

                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
                filter.setAttribute('id', 'glow');
                filter.innerHTML =
                    '<feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>';
                defs.appendChild(filter);
                svg.appendChild(defs);

                initParticles(svg, allPaths);
            }

            function initParticles(svg, paths) {
                if (animFrameId) cancelAnimationFrame(animFrameId);
                svg.querySelectorAll('.particle').forEach(p => p.remove());
                particles = [];
                if (!paths.length) return;
                const glowColor = getGlowColor();
                const count = Math.min(36, paths.length * 3);
                for (let i = 0; i < count; i++) {
                    const pd = paths[Math.floor(Math.random() * paths.length)];
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('class', 'particle');
                    circle.setAttribute('r', '2.2');
                    circle.setAttribute('fill', glowColor);
                    circle.setAttribute('opacity', '0.6');
                    circle.setAttribute('filter', 'url(#glow)');
                    svg.appendChild(circle);
                    particles.push({ el: circle, pathD: pd.d, offset: Math.random(), speed: 0.0007 + Math.random() *
                            0.0028 });
                }
                const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                tempPath.setAttribute('visibility', 'hidden');
                svg.appendChild(tempPath);

                function animate() {
                    particles.forEach(p => {
                        p.offset += p.speed;
                        if (p.offset > 1) p.offset -= 1;
                        tempPath.setAttribute('d', p.pathD);
                        const len = tempPath.getTotalLength();
                        if (len > 0) {
                            const pt = tempPath.getPointAtLength(p.offset * len);
                            p.el.setAttribute('cx', pt.x);
                            p.el.setAttribute('cy', pt.y);
                            const fade = p.offset < 0.1 ? p.offset / 0.1 : p.offset > 0.9 ? (1 - p.offset) /
                                0.1 : 1;
                            p.el.setAttribute('opacity', (0.3 + fade * 0.55).toFixed(2));
                        }
                    });
                    animFrameId = requestAnimationFrame(animate);
                }
                animate();
            }

            // ──────────────────────────────────────
            // NODE CLICK
            // ──────────────────────────────────────
            function onNodeClick(nodeId) {
                const config = NODE_CONFIG[currentUseCase];
                let foundNode = null;
                for (const row of config.rows) {
                    for (const node of row.nodes) { if (node.id === nodeId) { foundNode = node; break; } }
                    if (foundNode) break;
                }
                if (!foundNode) return;
                if (selectedNodeId === nodeId) { selectedNodeId = null;
                    detailPanel.classList.remove('open'); } else {
                    selectedNodeId = nodeId;
                    detailTitle.textContent =
                        `${foundNode.name[currentLang] || foundNode.name.en} — ${foundNode.sub[currentLang] || foundNode.sub.en}`;
                    detailBody.innerHTML = foundNode.desc[currentLang] || foundNode.desc.en;
                    const tierNames = { starter: t('tier_starter') + ' €699', pro: t('tier_pro') +
                            ' €4,5K', enterprise: t('tier_ent') + ' €25K' };
                    detailTiers.innerHTML = ['starter', 'pro', 'enterprise'].map(tier =>
                        `<span class="detail-tier-pill ${tierRank(foundNode.tier) <= tierRank(tier) ? 'dtp-on' : 'dtp-off'}">${tierNames[tier]}</span>`
                    ).join('');
                    detailPanel.classList.add('open');
                }
                renderFlowGrid();
            }

            // ──────────────────────────────────────
            // TIER SWITCHING
            // ──────────────────────────────────────
            window.setTier = function(tier, btn) {
                currentTier = tier;
                selectedNodeId = null;
                detailPanel.classList.remove('open');
                flowTierIndicator.textContent = t('click_node');
                document.querySelectorAll('.sc-btn').forEach(b => b.className = 'sc-btn');
                btn.classList.add(tier === 'starter' ? 'active-s' : tier === 'pro' ? 'active-p' : 'active-e');
                renderFlowGrid();
            };

            // ──────────────────────────────────────
            // USE CASE SWITCHING
            // ──────────────────────────────────────
            window.setUseCase = function(uc, btn) {
                currentUseCase = uc;
                selectedNodeId = null;
                detailPanel.classList.remove('open');
                flowTierIndicator.textContent = t('click_node');
                document.querySelectorAll('.persona-btn').forEach(b => b.className = 'persona-btn');
                btn.classList.add(uc === 'leadgen' ? 'active-lg' : uc === 'hiring' ? 'active-hi' : 'active-se');
                renderFlowGrid();
            };

            // ──────────────────────────────────────
            // LANGUAGE TOGGLE
            // ──────────────────────────────────────
            window.toggleLang = function() {
                currentLang = currentLang === 'de' ? 'en' : 'de';
                updateI18n();
                const wasSelected = selectedNodeId;
                renderFlowGrid();
                if (wasSelected) {
                    selectedNodeId = wasSelected;
                    const config = NODE_CONFIG[currentUseCase];
                    let foundNode = null;
                    for (const row of config.rows) {
                        for (const node of row.nodes) { if (node.id === wasSelected) { foundNode = node;
                                break; } }
                        if (foundNode) break;
                    }
                    if (foundNode) {
                        detailTitle.textContent =
                            `${foundNode.name[currentLang] || foundNode.name.en} — ${foundNode.sub[currentLang] || foundNode.sub.en}`;
                        detailBody.innerHTML = foundNode.desc[currentLang] || foundNode.desc.en;
                        const tierNames = { starter: t('tier_starter') + ' €699', pro: t('tier_pro') +
                                ' €4,5K', enterprise: t('tier_ent') + ' €25K' };
                        detailTiers.innerHTML = ['starter', 'pro', 'enterprise'].map(tier =>
                            `<span class="detail-tier-pill ${tierRank(foundNode.tier) <= tierRank(tier) ? 'dtp-on' : 'dtp-off'}">${tierNames[tier]}</span>`
                        ).join('');
                        detailPanel.classList.add('open');
                    }
                }
                flowTierIndicator.textContent = t('click_node');
            };

            // ──────────────────────────────────────
            // RESIZE
            // ──────────────────────────────────────
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => updateSVGConnections(), 200);
            });

            // ──────────────────────────────────────
            // INIT
            // ──────────────────────────────────────
            function init() {
                updateI18n();
                flowTierIndicator.textContent = t('click_node');
                renderFlowGrid();
            }
            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
