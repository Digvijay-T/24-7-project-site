<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24/7 PROJECT — Sales Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D0F;--s1:#141416;--s2:#1C1C1F;--s3:#242427;--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.16);--white:#F5F5F6;--muted:#8A8A96;--dim:#5A5A66;--green:#3ECF8E;--gd:rgba(62,207,142,0.10);--orange:#F97316;--od:rgba(249,115,22,0.10);--red:#EF4444;--amber:#F59E0B;--blue:#60A5FA;--purple:#C084FC;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--white);font-family:var(--sans);min-height:100vh}
::selection{background:var(--green);color:#000}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
/* DEMO BAR */
.demo-bar{background:linear-gradient(90deg,rgba(62,207,142,0.08),rgba(62,207,142,0.03));border-bottom:1px solid rgba(62,207,142,0.15);padding:10px 16px;position:sticky;top:0;z-index:100}
.demo-bar-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.demo-pill{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--green);color:#000;padding:3px 9px;border-radius:20px;flex-shrink:0}
.demo-note{font-size:11px;color:var(--muted)}
.persona-row{display:flex;gap:4px;flex-wrap:wrap}
.persona-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 13px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.persona-btn:hover{border-color:var(--b3);color:var(--white)}
.persona-btn.active-lg{color:#3ECF8E;background:rgba(62,207,142,0.08);border-color:rgba(62,207,142,0.3)}
.persona-btn.active-hi{color:#60A5FA;background:rgba(96,165,250,0.08);border-color:rgba(96,165,250,0.3)}
.persona-btn.active-se{color:#C084FC;background:rgba(192,132,252,0.08);border-color:rgba(192,132,252,0.3)}
.dot-lg{width:6px;height:6px;border-radius:50%;background:#3ECF8E;flex-shrink:0}
.dot-hi{width:6px;height:6px;border-radius:50%;background:#60A5FA;flex-shrink:0}
.dot-se{width:6px;height:6px;border-radius:50%;background:#C084FC;flex-shrink:0}
.sc-row{display:flex;gap:4px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.05);padding-top:8px;margin-top:4px}
.sc-label{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;padding-top:6px;flex-shrink:0}
.sc-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 11px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.sc-btn:hover{border-color:var(--b3);color:var(--white)}
.sc-btn.active{background:var(--s2);color:var(--green);border-color:rgba(62,207,142,0.3)}
/* PERSONA BANNER */
.persona-banner{display:flex;align-items:center;gap:14px;padding:11px 16px;border-radius:var(--r);margin-bottom:10px;border:1px solid;position:relative;overflow:hidden}
.pb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pb-text{display:flex;flex-direction:column;gap:2px}
.pb-name{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.pb-desc{font-size:11px;color:var(--muted)}
/* SHELL */
.shell{max-width:920px;margin:0 auto;padding:0 20px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 22px;border-bottom:1px solid var(--b1);margin-bottom:20px;gap:12px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon span{font-family:var(--mono);font-size:8px;font-weight:700;color:#000}
.brand-name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1.5px}
.tb-right{display:flex;align-items:center;gap:10px}
.co-name{font-size:13px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-pill{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.sp-active{background:var(--gd);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.sp-trial{background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.2)}
.sp-suspended{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.lang-btn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;border:1px solid var(--green);background:var(--green);color:#000;cursor:pointer;border-radius:4px;transition:all .2s}
.lang-btn:hover{background:transparent;color:var(--green)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px}
.ch{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.sus{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.sus-text{flex:1;font-size:13px;color:var(--red);line-height:1.5}
.sus-text strong{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.gauge-inner{display:flex;align-items:center;gap:24px;flex-wrap:wrap;padding:20px}
.gauge-wrap{position:relative;flex-shrink:0}
.gauge-wrap svg{transform:rotate(-90deg);display:block}
.gc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gp{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.gl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.gr{flex:1;min-width:200px}
.plan-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green);background:var(--gd);border:1px solid rgba(62,207,142,0.2);padding:3px 8px;border-radius:20px;margin-bottom:14px}
.pd{width:5px;height:5px;border-radius:50%;background:var(--green)}
.stats-row{display:flex}
.stat-b{flex:1;padding:0 12px;border-right:1px solid var(--b1)}
.stat-b:first-child{padding-left:0}.stat-b:last-child{border-right:none}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:var(--mono)}
.stat-v{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1}
.stat-u{font-size:10px;font-weight:400;color:var(--muted);margin-left:2px}
.prog-wrap{margin-top:16px}
.prog-track{height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.rn{margin-top:7px;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px}
.an-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.an{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.al{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.av{font-family:var(--mono);font-size:19px;font-weight:700}
.as{font-size:11px;color:var(--muted);margin-top:3px}
.calling-g{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:18px}
.fg{display:flex;flex-direction:column;gap:14px}
.fl{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.fi{background:var(--s2);border:1px solid var(--b1);color:var(--white);font-family:var(--mono);font-size:11px;padding:8px 10px;border-radius:5px;width:100%;outline:none;transition:border-color .2s}
.fi:focus{border-color:rgba(62,207,142,0.4)}.fi option{background:var(--s2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.tl{font-size:13px;font-weight:500}.tsub{font-size:11px;color:var(--muted);margin-top:2px}
.toggle-sw{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.track{position:absolute;inset:0;background:var(--s3);border-radius:11px;cursor:pointer;transition:background .2s;border:1px solid var(--b2)}
.track:after{content:'';position:absolute;left:3px;top:3px;width:14px;height:14px;background:var(--muted);border-radius:50%;transition:all .2s}
.toggle-sw input:checked+.track{background:var(--green)}
.toggle-sw input:checked+.track:after{transform:translateX(18px);background:#000}
.days-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.day-btn{font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 7px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.day-btn.on{background:var(--gd);color:var(--green);border-color:rgba(62,207,142,0.3)}
.save-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:8px 16px;background:var(--green);color:#000;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.save-btn:hover{background:#2db87b;transform:translateY(-1px)}
.number-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s2);border-radius:7px;border:1px solid var(--b1);margin:12px 16px}
.number-val{font-family:var(--mono);font-size:14px;font-weight:700}
.number-type{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.number-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;background:var(--gd);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.leads-tabs{display:flex;gap:0;border-bottom:1px solid var(--b1);margin:0 16px}
.leads-tab{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.5px;padding:10px 14px;background:transparent;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.leads-tab.active{color:var(--green);border-bottom-color:var(--green)}
.leads-tab-panel{padding:16px;display:none}
.leads-tab-panel.active{display:block}
.leads-input-row{display:flex;gap:8px;align-items:flex-start}
.leads-input-row .fi{flex:1;min-width:0}
.add-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:8px 14px;background:var(--green);color:#000;border:none;border-radius:5px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.add-btn:hover{background:#2db87b}
.csv-drop{border:1px dashed var(--b2);border-radius:7px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:10px}
.csv-drop:hover{border-color:var(--green)}
.csv-drop-text{font-size:12px;color:var(--muted);line-height:1.6}
.csv-drop-text strong{color:var(--white);display:block;margin-bottom:4px}
.leads-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:0 16px 16px}
.lead-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s2);border-radius:6px;border:1px solid var(--b1);min-width:0}
.lead-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--white);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lead-name{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lead-st{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;white-space:nowrap}
.lst-pending{background:var(--s3);color:var(--muted);border:1px solid var(--b2)}
.lst-calling{background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.lst-called{background:var(--gd);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.lst-failed{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.del-btn{font-size:13px;color:var(--dim);background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0;transition:color .15s;line-height:1}
.del-btn:hover{color:var(--red)}
.leads-footer{padding:10px 16px;border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.launch-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:7px 14px;background:var(--green);color:#000;border:none;border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:0.5px}
.launch-btn:hover{background:#2db87b;transform:translateY(-1px)}
.launch-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.no-leads{padding:24px 16px;text-align:center;font-size:12px;color:var(--dim)}
.upsell-card{background:linear-gradient(135deg,var(--s1) 0%,rgba(249,115,22,0.04) 100%);border:1px solid rgba(249,115,22,0.15);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.upsell-header{padding:13px 16px;border-bottom:1px solid rgba(249,115,22,0.1);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--orange)}
.upsell-body{padding:16px}
.upsell-stat{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.up-pkgs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.up-pkg{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:14px;transition:border-color .2s}
.up-pkg:hover{border-color:var(--b2)}
.up-pkg.feat{border-color:var(--orange);background:linear-gradient(135deg,var(--s2) 0%,var(--od) 100%)}
.up-tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--orange);margin-bottom:6px;font-weight:700}
.up-amt{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:3px}
.up-desc{font-size:11px;color:var(--muted);margin-bottom:10px}
.btn{display:block;width:100%;padding:8px;font-family:var(--mono);font-size:10px;font-weight:700;text-align:center;border-radius:5px;cursor:pointer;border:none;transition:all .2s}
.btn-out{background:transparent;color:var(--white);border:1px solid var(--b2)}
.btn-out:hover{border-color:var(--b3)}
.btn-org{background:var(--orange);color:#fff}
.btn-org:hover{background:#e06412;transform:translateY(-1px)}
.uu{border-top:1px solid rgba(249,115,22,0.1);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.uu-text{font-size:12px;color:var(--muted)}.uu-text strong{color:var(--white);display:block;margin-bottom:1px}
.uu-btn{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--orange);text-decoration:none;border:1px solid rgba(249,115,22,0.3);padding:7px 12px;border-radius:5px;background:transparent;cursor:pointer;transition:background .2s;white-space:nowrap}
.uu-btn:hover{background:var(--od)}
.ctable{width:100%;border-collapse:collapse}
.ctable th{padding:9px 14px;text-align:left;font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--b1);font-weight:500}
.ctable td{padding:10px 14px;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)}
.ctable tr.cr:hover td{background:rgba(255,255,255,0.015);cursor:pointer}
.tm{font-family:var(--mono);font-size:10px;color:var(--muted)}
.tn{font-family:var(--mono);font-size:10px;color:var(--white)}
.st-ok{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;background:var(--gd);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.st-fail{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--b1)}
.ls-h{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;background:var(--gd);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.ls-m{display:inline-block;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.exp-row td{padding:0}
.exp-in{padding:12px 14px 14px;background:rgba(0,0,0,0.25);border-top:1px solid var(--b1)}
.elbl{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.ebox{font-size:11px;color:var(--muted);line-height:1.6;background:var(--s2);border-radius:5px;padding:10px;margin-top:4px}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.caret{font-size:9px;color:var(--dim);transition:transform .2s;display:inline-block;margin-left:4px}
.caret.open{transform:rotate(90deg)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px}
.sg-full{grid-column:1/-1}
textarea.fi{padding:10px 12px;font-family:var(--sans)}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ic{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px}
.icl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.icv{font-size:13px;font-weight:600}
.ics{font-size:11px;color:var(--muted);margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--b2);padding:11px 16px;border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--white);transform:translateY(16px);opacity:0;transition:all .3s;z-index:999;pointer-events:none;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(62,207,142,0.3);color:var(--green)}
.fi-anim{opacity:0;animation:fi .4s ease forwards}
.fi-anim:nth-child(1){animation-delay:.03s}.fi-anim:nth-child(2){animation-delay:.08s}.fi-anim:nth-child(3){animation-delay:.13s}
.fi-anim:nth-child(4){animation-delay:.18s}.fi-anim:nth-child(5){animation-delay:.23s}.fi-anim:nth-child(6){animation-delay:.28s}
.fi-anim:nth-child(7){animation-delay:.33s}.fi-anim:nth-child(8){animation-delay:.38s}.fi-anim:nth-child(9){animation-delay:.43s}
@keyframes fi{to{opacity:1}}
.wins-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--b1);border:1px solid var(--b1);margin-bottom:10px}
.win-tile{background:var(--s1);padding:14px 12px;text-align:center}
.win-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--white);line-height:1;margin-bottom:4px}
.win-num.acc{color:var(--green)}
.win-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);line-height:1.4}
.hot-card{background:linear-gradient(135deg,rgba(62,207,142,0.04) 0%,var(--s1) 100%);border:1px solid rgba(62,207,142,0.12);margin-bottom:10px}
.hot-header{padding:12px 16px;border-bottom:1px solid rgba(62,207,142,0.1);display:flex;align-items:center;justify-content:space-between}
.hot-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green)}
.hot-count{font-family:var(--mono);font-size:9px;color:var(--dim)}
.hot-body{padding:10px 16px;display:flex;flex-direction:column;gap:6px}
.hot-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(0,0,0,0.2);border-radius:3px}

    <div class="leads-input-row">
      <input type="tel" class="fi" id="dp" placeholder="${t.phonePh}" style="flex:2;min-width:0" onkeydown="if(event.key==='Enter')addDemoLead()">
      <input type="text" class="fi" id="dn" placeholder="${t.namePh}" style="flex:1;min-width:0" onkeydown="if(event.key==='Enter')addDemoLead()">
      <button class="add-btn" onclick="addDemoLead()">${t.addBtn}</button>
    </div>
  </div>
  <div class="leads-tab-panel" data-panel="c" style="padding:16px">
    <div class="csv-drop" onclick="demoCSV()">
      <div class="csv-drop-text"><strong>${t.csvDrop}</strong>${t.csvSub}</div>
    </div>
  </div>
  <div class="leads-list" id="leads-list">${leadsHTML}</div>
  <div class="leads-footer">
    <span class="leads-count-el" style="font-family:var(--mono);font-size:10px;color:var(--muted)">${t.lCount(pending,demoLeads.length)}</span>
    <button class="launch-btn" id="launch-btn" onclick="demoLaunch()" ${pending===0?'disabled':''}>${launchBtnTxt}</button>
  </div>
</div>
${showOv?`<div class="upsell-card fi-anim"><div class="upsell-header">${t.upsell}</div><div class="upsell-body"><p class="upsell-stat">${t.upsellStat}</p><div class="up-pkgs"><div class="up-pkg"><div class="up-amt">+1.000 min</div><div class="up-desc">${t.once}</div><button class="btn btn-out" onclick="demoToast()">${t.buy}</button></div><div class="up-pkg feat"><div class="up-tag">${t.rec}</div><div class="up-amt">+5.000 min</div><div class="up-desc">${t.once}</div><button class="btn btn-org" onclick="demoToast()">${t.buy}</button></div></div></div>${s.tier==='starter'?`<div class="uu"><div class="uu-text"><strong>${t.upgradeText}</strong>${t.upgradeSub}</div><button class="uu-btn" onclick="demoToast()">${t.upgradeBtn}</button></div>`:''}</div>`:''}
<div class="card fi-anim">
  <div class="ch"><span class="ct">${t.calls}</span></div>
  <table class="ctable"><thead><tr><th>${t.cDate}</th><th>${t.cTime}</th><th>${callsHeader}</th><th>${t.cDur}</th><th>${t.cStat}</th><th>${scoreLabel}</th></tr></thead><tbody>${callRows}</tbody></table>
</div>
${isPro?`<div class="card fi-anim">
  <div class="ch"><span class="ct">${t.sentLbl} <span class="pro-badge">${t.proOnly}</span></span></div>
  <div class="an-row" style="grid-template-columns:repeat(3,1fr);margin:0 0 12px">
    <div class="an"><div class="al">${t.positiv}</div><div class="av" style="color:var(--green)">${sentPos}</div><div class="as">${t.month}</div></div>
    <div class="an"><div class="al">${t.neutral}</div><div class="av">${sentNeu}</div><div class="as">${t.month}</div></div>
    <div class="an"><div class="al">${t.negativ}</div><div class="av" style="color:var(--red)">${sentNeg}</div><div class="as">${t.month}</div></div>
  </div>
  <div style="padding:0 16px 14px;display:flex;gap:3px;height:6px">
    <div style="flex:${sentPos||1};background:var(--green);border-radius:2px 0 0 2px"></div>
    <div style="flex:${sentNeu||1};background:var(--dim)"></div>
    <div style="flex:${sentNeg||1};background:var(--red);border-radius:0 2px 2px 0"></div>
  </div>
</div>
<div class="roi-card fi-anim">
  <div class="roi-header"><span class="roi-title">${t.roiTitle}</span><span class="pro-badge">${t.proOnly}</span></div>
  <div class="roi-body">
    <div class="roi-figure">€${projRevenue.toLocaleString('de-DE')}</div>
    <div class="roi-sub">${t.roiSub(s.calls,'1.5')}</div>
    <div class="roi-inputs">
      <div><div class="roi-input-label">${t.avgDeal}</div><input class="fi" type="number" value="2000" onclick="demoToast()" style="text-align:right"></div>
      <div><div class="roi-input-label">${t.closeRateLabel}</div><input class="fi" type="number" value="1.5" onclick="demoToast()" style="text-align:right"></div>
    </div>
  </div>
</div>
<div class="integ-card fi-anim">
  <div class="integ-header"><span class="integ-title">${t.integTitle}</span><span class="pro-badge">${t.proOnly}</span></div>
  <div class="integ-body">
    <div class="integ-grid">
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integCRM}</span></div>
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integSMS}</span></div>
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integSlack}</span></div>
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integCal}</span></div>
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integWebhook}</span></div>
      <div class="integ-item"><span class="integ-dot"></span><span>${t.integCustom}</span></div>
    </div>
    <p class="integ-note">${t.integNote}</p>
  </div>
</div>`:``}
<div class="card fi-anim">
  <div class="ch"><span class="ct">${t.agentT}</span></div>
  <div class="sg">
    <div><div class="fl">${t.coN}</div><input class="fi" value="${ag.company}"></div>
    <div><div class="fl">${t.ind}</div><input class="fi" value="${ag.industry}"></div>
    <div><div class="fl">${t.role}</div><input class="fi" value="${ag.role}"></div>
    ${!isPro
      ?`<div><div class="fl">${t.useCase}</div><select class="fi"><option value="qualifying_leads" ${ag.useCase==='qualifying_leads'?'selected':''}>${t.ucLeads}</option><option value="qualifying_employees" ${ag.useCase==='qualifying_employees'?'selected':''}>${t.ucEmployees}</option><option value="purchasing" ${ag.useCase==='purchasing'?'selected':''}>${t.ucPurchasing}</option></select></div>
      <div class="sg-full"><div class="fl">${t.companyCtx}</div><textarea class="fi" rows="4" style="resize:vertical;line-height:1.6;font-size:13px">${ag.context}</textarea></div>`
      :`<div><div class="fl">${t.personaName}</div><input class="fi" value="${ag.personaName}"></div>
      <div class="sg-full"><div class="fl">${t.customInstr}</div><textarea class="fi" rows="5" style="resize:vertical;line-height:1.6;font-size:13px">${ag.prompt}</textarea></div>
      <div class="sg-full"><div class="fl">${t.objHandling}</div><textarea class="fi" rows="3" style="resize:vertical;line-height:1.6;font-size:13px">${ag.obj}</textarea></div>
      <div class="sg-full coming-soon-f"><div class="fl">${t.escalation} <span class="cs-badge">Coming soon</span></div><textarea class="fi" rows="2" style="resize:none;line-height:1.6;font-size:13px" placeholder="${t.escalationNote}"></textarea></div>`}
    <div style="display:flex;flex-direction:column;justify-content:flex-end;gap:8px"><button class="save-btn" onclick="demoSave()">${lang==='de'?'Speichern':'Save'}</button></div>
  </div>
</div>
<div class="info-row fi-anim">
  <div class="ic"><div class="icl">${t.plan}</div><div class="icv">${tier}</div><div class="ics">${s.total.toLocaleString('de-DE')} ${t.min} / Monat</div></div>
  <div class="ic"><div class="icl">${t.renewal}</div><div class="icv">${s.renewal}</div><div class="ics">Digistore24 · Stripe</div></div>
</div>`;
}

// Init from URL param
const urlP=new URLSearchParams(window.location.search).get('demo');
if(urlP&&PERSONAS[urlP])persona=urlP;
document.getElementById('btn-'+persona).classList.add(PERSONAS[persona].btnActive);
render();
</script>
</body>
</html>
